<style>
  :root {
    --yellow: #F5B800;
    --yellow-light: #FFD33D;
    --dark: #1E1F23;
    --dark2: #2A2B30;
    --dark3: #35363D;
    --gray-light: #8A8B95;
    --white: #FFFFFF;
    --green: #2ECC71;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family:'Nunito',sans-serif; background:var(--dark); color:var(--white);
    overflow-x:hidden; font-weight:400; -webkit-font-smoothing:antialiased;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 60px; background:rgba(30,31,35,0.85);
    backdrop-filter:blur(16px); border-bottom:1px solid rgba(245,184,0,0.08);
    transition:background .3s;
  }
  .nav-logo img { height:30px; display:block; }
  .nav-links { display:flex; align-items:center; gap:36px; }
  .nav-links a { color:var(--gray-light); text-decoration:none; font-size:15px; font-weight:600; transition:color .2s; }
  .nav-links a:hover { color:var(--white); }
  .nav-links a.active { color:var(--yellow); }
  .nav-cta {
    background:var(--yellow); color:var(--dark)!important; padding:10px 22px;
    border-radius:50px; font-weight:800!important; font-size:14px!important; transition:all .2s!important;
  }
  .nav-cta:hover { background:var(--yellow-light)!important; transform:translateY(-1px); }

  /* SECTIONS / FOOTER (shared) */
  .section-label { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--yellow); font-weight:800; margin-bottom:16px; }
  .section-title { font-size:clamp(32px,4vw,52px); font-weight:900; letter-spacing:-1px; line-height:1.1; }
  .section-title em { color:var(--yellow); font-style:normal; }
  .section-sub { color:var(--gray-light); font-size:17px; margin-top:16px; font-weight:500; line-height:1.6; }

  footer { background:var(--dark); border-top:1px solid rgba(255,255,255,0.06); padding:40px 60px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; }
  footer .foot-logo img { height:26px; display:block; }
  .footer-links { display:flex; gap:24px; flex-wrap:wrap; }
  .footer-links a { color:var(--gray-light); text-decoration:none; font-size:13px; font-weight:600; transition:color .2s; }
  .footer-links a:hover { color:var(--white); }
  .footer-copy { color:var(--gray-light); font-size:13px; font-weight:600; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .reveal { opacity:0; transform:translateY(30px); transition:opacity .7s ease, transform .7s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  /* ===== BLOG INDEX ===== */
  .blog-hero { padding:150px 60px 40px; max-width:1100px; margin:0 auto; }
  .blog-hero h1 { font-size:clamp(38px,5vw,62px); font-weight:900; letter-spacing:-1.5px; line-height:1.05; animation:fadeUp .6s ease both; }
  .blog-hero h1 em { color:var(--yellow); font-style:normal; }
  .blog-hero p { color:var(--gray-light); font-size:18px; margin-top:20px; max-width:560px; font-weight:500; line-height:1.65; animation:fadeUp .6s .1s ease both; }
  .posts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:24px;
    max-width:1100px; margin:48px auto; padding:0 60px 100px; }
  .post-card { display:flex; flex-direction:column; background:var(--dark2); border:1px solid rgba(255,255,255,0.06);
    border-radius:22px; padding:32px; text-decoration:none; color:inherit; transition:all .3s; position:relative; overflow:hidden; }
  .post-card::before { content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(245,184,0,0.05) 0%,transparent 50%); opacity:0; transition:opacity .3s; }
  .post-card:hover { border-color:rgba(245,184,0,0.25); transform:translateY(-4px); }
  .post-card:hover::before { opacity:1; }
  .post-card .badge { display:inline-flex; align-self:flex-start; align-items:center; gap:6px; background:rgba(245,184,0,0.1);
    color:var(--yellow); border:1px solid rgba(245,184,0,0.2); border-radius:50px; font-size:12px; font-weight:700; padding:5px 12px; margin-bottom:18px; }
  .post-card h2 { font-size:22px; font-weight:800; letter-spacing:-0.4px; line-height:1.25; margin-bottom:12px; position:relative; }
  .post-card p { color:var(--gray-light); font-size:15px; line-height:1.6; font-weight:500; position:relative; flex:1; }
  .post-card .meta { color:var(--gray-light); font-size:13px; font-weight:600; margin-top:20px; display:flex; gap:14px; position:relative; }
  .post-card .read-more { color:var(--yellow); font-weight:800; font-size:15px; margin-top:18px; position:relative; }

  /* ===== POST ===== */
  .post-head { max-width:760px; margin:0 auto; padding:140px 22px 0; text-align:center; }
  .post-head .badge { display:inline-flex; align-items:center; gap:6px; background:rgba(245,184,0,0.12);
    border:1px solid rgba(245,184,0,0.25); color:var(--yellow); padding:7px 16px; border-radius:50px;
    font-size:13px; font-weight:700; margin-bottom:24px; }
  .post-head h1 { font-size:clamp(32px,4.6vw,52px); font-weight:900; letter-spacing:-1.2px; line-height:1.1; }
  .post-head h1 em { color:var(--yellow); font-style:normal; }
  .post-head .subtitle { color:var(--gray-light); font-size:19px; margin-top:20px; font-weight:500; line-height:1.6; }
  .post-head .post-meta { color:var(--gray-light); font-size:14px; font-weight:600; margin-top:26px;
    display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
  .post-divider { max-width:760px; margin:48px auto 0; border:0; border-top:1px solid rgba(255,255,255,0.08); }

  .post-body { max-width:760px; margin:0 auto; padding:48px 22px 40px; }
  .post-body > p { font-size:17.5px; line-height:1.85; color:#D7D8DE; margin:0 0 24px; font-weight:500; }
  .post-body h2 { font-size:clamp(26px,3vw,34px); font-weight:900; letter-spacing:-0.6px; margin:56px 0 18px; line-height:1.2; }
  .post-body h2 em { color:var(--yellow); font-style:normal; }
  .post-body h3 { font-size:21px; font-weight:800; margin:36px 0 14px; color:var(--white); }
  .post-body ul, .post-body ol { margin:0 0 24px; padding-left:24px; }
  .post-body li { font-size:17px; line-height:1.8; color:#D7D8DE; margin-bottom:10px; font-weight:500; }
  .post-body li::marker { color:var(--yellow); font-weight:800; }
  .post-body a { color:var(--yellow); text-decoration:none; border-bottom:1px solid rgba(245,184,0,0.35); transition:all .2s; }
  .post-body a:hover { color:var(--yellow-light); border-color:var(--yellow-light); }
  .post-body strong { color:var(--white); font-weight:800; }
  .post-body blockquote { border-left:3px solid var(--yellow); background:var(--dark2); border-radius:0 14px 14px 0;
    padding:18px 24px; margin:0 0 24px; color:#D7D8DE; font-size:17px; line-height:1.7; font-weight:500; }
  .post-body blockquote p:last-child { margin-bottom:0; }
  .post-body table { width:100%; border-collapse:collapse; margin:0 0 28px; font-size:15px; }
  .post-body th, .post-body td { text-align:left; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .post-body th { background:var(--dark2); color:var(--yellow); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:0.5px; }
  .post-body td { color:#D7D8DE; font-weight:500; }
  .post-body tr:hover td { background:rgba(255,255,255,0.02); }
  .post-body img { max-width:100%; border-radius:18px; margin:8px 0 28px; }
  .post-body hr { border:0; border-top:1px solid rgba(255,255,255,0.08); margin:40px 0; }

  /* callout box */
  .callout { background:linear-gradient(135deg,var(--dark2) 0%,rgba(245,184,0,0.06) 100%);
    border:1px solid rgba(245,184,0,0.18); border-radius:18px; padding:28px 30px; margin:0 0 28px; }
  .callout strong { color:var(--yellow); }

  /* CTA */
  .post-cta { max-width:760px; margin:24px auto 0; padding:0 22px; }
  .post-cta .box { background:linear-gradient(135deg,var(--dark2) 0%,rgba(245,184,0,0.1) 100%);
    border:1px solid rgba(245,184,0,0.22); border-radius:26px; padding:44px 40px; text-align:center; position:relative; overflow:hidden; }
  .post-cta .box::before { content:''; position:absolute; top:-80px; right:-80px; width:280px; height:280px;
    background:radial-gradient(circle,rgba(245,184,0,0.15) 0%,transparent 70%); pointer-events:none; }
  .post-cta h3 { font-size:clamp(24px,3vw,32px); font-weight:900; letter-spacing:-0.6px; margin-bottom:12px; position:relative; }
  .post-cta h3 em { color:var(--yellow); font-style:normal; }
  .post-cta p { color:var(--gray-light); font-size:16px; max-width:460px; margin:0 auto 28px; line-height:1.6; font-weight:500; position:relative; }
  .post-cta .btn-primary { display:inline-flex; align-items:center; gap:8px; background:var(--yellow); color:var(--dark);
    padding:15px 32px; border-radius:50px; font-weight:800; font-size:16px; text-decoration:none; border:none;
    transition:all .25s; box-shadow:0 8px 30px rgba(245,184,0,0.3); position:relative; }
  .post-cta .btn-primary:hover { background:var(--yellow-light); transform:translateY(-2px); box-shadow:0 12px 40px rgba(245,184,0,0.4); }

  /* related / back */
  .post-foot-nav { max-width:760px; margin:60px auto 0; padding:0 22px; }
  .post-foot-nav a { color:var(--gray-light); text-decoration:none; font-weight:700; font-size:15px; transition:color .2s; }
  .post-foot-nav a:hover { color:var(--yellow); }

  @media (max-width:900px){
    nav { padding:14px 22px; }
    .nav-links { display:none; }
    .blog-hero { padding:120px 22px 20px; }
    .posts-grid { padding:0 22px 80px; grid-template-columns:1fr; }
    footer { flex-direction:column; text-align:center; padding:32px 22px; }
    .post-cta .box { padding:36px 24px; }
  }
</style>
